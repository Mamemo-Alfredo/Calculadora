<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Calculador - JS(Puro)</title>
</head>
<body>
    <nav>
        <input type="text" value="0">
        <div id="div_btns">
            <div id="div_btns_2">
                <button onclick="limpar()">C</button>
                <button onclick="apagar_1()">&lt;</button>
                <button onclick="adicionar('/')">/</button>
                <button onclick="adicionar('*')">*</button>
            </div>
            <div id="div_btns_2">
                <button onclick="adicionar('7')">7</button>
                <button onclick="adicionar('8')">8</button>
                <button onclick="adicionar('9')">9</button>
                <button onclick="adicionar('+')">+</button>
            </div>
            <div id="div_btns_2">
                <button onclick="adicionar('4')">4</button>
                <button onclick="adicionar('5')">5</button>
                <button onclick="adicionar('6')">6</button>
                <button onclick="adicionar('-')">-</button>
            </div>
            <div id="div_btns_2">
                <button onclick="adicionar('1')">1</button>
                <button onclick="adicionar('2')">2</button>
                <button onclick="adicionar('3')">3</button>
                <button onclick="resultado()">=</button>
            </div>
            <div id="div_btns_2">
                <button onclick="adicionar('0')" style="width: 68%;">0</button>
                <button onclick="adicionar('.')">,</button>
            </div>
        </div>
    </nav>

    <script src="js/script.js"></script>
</body>
</html>
